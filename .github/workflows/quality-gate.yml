name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash
    env:
      STRAVA_CLIENT_ID: '123456'
      STRAVA_CLIENT_SECRET: ci-placeholder-secret-value-123456789
      STRAVA_WEBHOOK_VERIFY_TOKEN: ci-placeholder-webhook-token-123456789
      NEXTAUTH_URL: https://dash.corridapratodos.com.br
      NEXTAUTH_SECRET: ci-placeholder-nextauth-secret-1234567890
      STRAVA_WEBHOOK_POST_TOKEN: ci-placeholder-webhook-post-token-123456789
      OAUTH_TOKEN_ENCRYPTION_KEY: 01234567890123456789012345678901
      FIREBASE_SERVICE_ACCOUNT: '{"type":"service_account","project_id":"ci-project","private_key_id":"ci-key","private_key":"-----BEGIN PRIVATE KEY-----\\nci-placeholder\\n-----END PRIVATE KEY-----\\n","client_email":"ci@example.iam.gserviceaccount.com","client_id":"1234567890","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_x509_cert_url":"https://example.com/cert"}'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dash/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment contract
        run: npm run check:env

      - name: Run tests and typecheck (no build)
        run: npm run check
